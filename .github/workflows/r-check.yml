name: R-CMD-check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
      - name: Install dependencies
        run: |
          Rscript -e "install.packages(c('devtools','nhanesA','survey','survival',
            'survminer','ggplot2','tidyverse','shiny','shinydashboard',
            'plotly','DT','broom','rcmdcheck'))"
      - name: Check package
        run: Rscript -e "rcmdcheck::rcmdcheck(args='--no-manual', error_on='error')"
